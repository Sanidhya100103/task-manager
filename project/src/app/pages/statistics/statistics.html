<div class="statistics-container">
  <h1>Statistics</h1>

  <!-- Summary Cards -->
  <div class="cards-grid">
    <mat-card class="stat-card">
      <mat-icon class="card-icon">assignment</mat-icon>
      <div class="stat-number">{{ totalTasks }}</div>
      <div class="stat-label">Total Tasks</div>
    </mat-card>

    <mat-card class="stat-card">
      <mat-icon class="card-icon completed">check_circle</mat-icon>
      <div class="stat-number">{{ completedTasks }}</div>
      <div class="stat-label">Completed</div>
    </mat-card>

    <mat-card class="stat-card">
      <mat-icon class="card-icon pending">schedule</mat-icon>
      <div class="stat-number">{{ pendingTasks }}</div>
      <div class="stat-label">Pending</div>
    </mat-card>

    <mat-card class="stat-card">
      <mat-icon class="card-icon overdue">warning</mat-icon>
      <div class="stat-number">{{ overdueTasks }}</div>
      <div class="stat-label">Overdue</div>
    </mat-card>
  </div>

  <!-- Completion Percentage -->
  <mat-card class="completion-card">
    <h2>Completion Rate</h2>
    <div class="completion-bar-container">
      <div class="completion-bar" [style.width.%]="completionPercentage"></div>
    </div>
    <div class="completion-text">{{ completionPercentage }}% Complete</div>
  </mat-card>

  <!-- Charts Row -->
  <div class="charts-grid">
    <mat-card class="chart-card">
      <h2>Task Status</h2>
      <canvas baseChart
        [data]="pieChartData"
        [options]="pieChartOptions"
        type="pie">
      </canvas>
    </mat-card>

    <mat-card class="chart-card">
      <h2>Tasks by Priority</h2>
      <canvas baseChart
        [data]="priorityChartData"
        [options]="priorityChartOptions"
        type="bar">
      </canvas>
    </mat-card>
  </div>
</div>
