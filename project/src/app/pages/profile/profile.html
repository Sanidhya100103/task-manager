<div class="profile-container">

  <!-- User Info Card -->
  <mat-card class="profile-card">
    <div class="avatar-section">
      <div class="avatar">
        {{ user?.name?.charAt(0)?.toUpperCase() }}
      </div>
      <div class="user-info">
        <h2>{{ user?.name }}</h2>
        <p>{{ user?.email }}</p>
      </div>
    </div>
  </mat-card>

  <!-- Change Password Card -->
  <mat-card class="password-card">
    <h2>Change Password</h2>

    <form [formGroup]="passwordForm" (ngSubmit)="onChangePassword()">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Current Password</mat-label>
        <input matInput formControlName="oldPassword"
               [type]="hideOld ? 'password' : 'text'">
        <button mat-icon-button matSuffix type="button"
                (click)="hideOld = !hideOld">
          <mat-icon>{{ hideOld ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="oldPassword?.hasError('required')">
          Current password is required
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>New Password</mat-label>
        <input matInput formControlName="newPassword"
               [type]="hideNew ? 'password' : 'text'">
        <button mat-icon-button matSuffix type="button"
                (click)="hideNew = !hideNew">
          <mat-icon>{{ hideNew ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="newPassword?.hasError('required')">
          New password is required
        </mat-error>
        <mat-error *ngIf="newPassword?.hasError('minlength')">
          Password must be at least 6 characters
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Confirm New Password</mat-label>
        <input matInput formControlName="confirmPassword"
               [type]="hideConfirm ? 'password' : 'text'">
        <button mat-icon-button matSuffix type="button"
                (click)="hideConfirm = !hideConfirm">
          <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="confirmPassword?.hasError('required')">
          Please confirm your password
        </mat-error>
        <mat-error *ngIf="passwordForm.hasError('passwordMismatch')">
          Passwords do not match
        </mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit"
              [disabled]="passwordForm.invalid">
        Change Password
      </button>

    </form>
  </mat-card>

</div>
